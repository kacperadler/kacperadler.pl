name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: lint, check, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Reads packageManager: "bun@x.y.z" from package.json
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ultracite/Biome)
        run: bun run lint

      - name: Type-check (.astro)
        run: bun run check

      - name: Prettier check (.astro)
        run: bunx prettier --check "**/*.astro"

      - name: Build
        run: bun run build
