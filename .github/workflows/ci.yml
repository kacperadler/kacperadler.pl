name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: lint, check, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Astro CLI (astro check, astro build) shells out to Node - bun
      # alone isn't enough. Astro 6 requires Node >= 22.12.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      # Reads packageManager: "bun@x.y.z" from package.json
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ultracite/Biome)
        run: bun run lint

      - name: Type-check (.astro)
        run: bun run check

      - name: Prettier check (.astro)
        run: bunx prettier --check "**/*.astro"

      - name: Build
        run: bun run build

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache the browser binaries between runs - keyed on the
      # @playwright/test version so an upgrade busts the cache.
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun pm ls @playwright/test | awk '/@playwright\/test/ {print $NF; exit}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install system deps for cached browsers
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Build
        run: bun run build

      - name: Run Playwright tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
