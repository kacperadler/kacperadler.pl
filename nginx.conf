# Cache-Control resolved by URI pattern - kept in a map so the server
# block uses a single add_header line. Putting Cache-Control inside
# location blocks would silently drop the security headers below
# because nginx's add_header doesn't inherit across levels.
map $uri $cache_control {
    ~^/_astro/                              "public, max-age=31536000, immutable";
    ~*\.(woff2?|ttf|otf|eot)$               "public, max-age=31536000, immutable";
    ~*\.(png|jpg|jpeg|gif|webp|avif|svg|ico)$ "public, max-age=2592000";
    default                                 "public, max-age=0, must-revalidate";
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Astro generates real .html files; no SPA fallback. Hashed assets
    # in /_astro/ are immutable. /404.html is the static fallback.

    server_tokens off;

    # Compression (text only - alpine nginx ships gzip; brotli would
    # need a custom build).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # Single set of headers so add_header inheritance can't drop them.
    add_header Cache-Control $cache_control always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Astro emits dir-style routes (/foo/index.html). Try the URI as a
    # file, then as a dir (auto-index), then with .html suffix - covers
    # /, /foo/, and edge cases.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Astro emits dist/404.html; nginx returns it for any unresolved URI.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
